approvedGitRepositories:
  - "https://github.com/*" # Restrict to trusted sources
  - "https://gitlab.com/*"

enableScripts: false # Disable by default; use `enableScripts: true` only in CI if needed

nodeLinker: node-modules

npmMinimalAgeGate: "7d"
# packageExtensions kept minimal.
# We bumped eslint plugin versions so they declare their eslint peers.
# The @typescript-eslint packages get typescript from our direct devDep.
